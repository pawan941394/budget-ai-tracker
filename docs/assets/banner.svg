<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c10" />
      <stop offset="50%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>
    
    <!-- Accent Gradient (Pink/Purple/Blue) -->
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#bc8cff" />
      <stop offset="100%" stop-color="#ff7b72" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="250" rx="12" fill="url(#bg-grad)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Decorative Circuit lines / Tech Grid -->
  <g stroke="#21262d" stroke-width="1" fill="none">
    <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200" />
    <path d="M 100,0 L 100,250 M 200,0 L 200,250 M 300,0 L 300,250 M 400,0 L 400,250 M 500,0 L 500,250 M 600,0 L 600,250 M 700,0 L 700,250" />
  </g>

  <!-- Abstract Glowing Shapes in corners -->
  <circle cx="50" cy="50" r="100" fill="#bc8cff" opacity="0.03" filter="url(#glow)" />
  <circle cx="750" cy="200" r="120" fill="#58a6ff" opacity="0.03" filter="url(#glow)" />

  <!-- Title & Subtitle -->
  <g transform="translate(60, 110)">
    <!-- Main Title -->
    <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="url(#accent-grad)" letter-spacing="1">
      BUDGET AI TRACKER
    </text>
    <!-- Subtitle -->
    <text x="0" y="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="400" fill="#8b949e" letter-spacing="0.5">
      Hybrid OCR Expense Extraction &amp; Intelligent Financial Chatbot
    </text>
    <!-- Tech list -->
    <text x="0" y="62" font-family="SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="12" font-weight="600" fill="#58a6ff" opacity="0.85">
      Django • FastAPI • Pydantic AI • Google Gemini • RapidOCR
    </text>
  </g>

  <!-- Graphic Elements (Receipt / Brain / Chat visual representation) -->
  <g transform="translate(600, 50)">
    <!-- Background glow for graphics -->
    <circle cx="70" cy="75" r="50" fill="#8a2be2" opacity="0.1" filter="url(#glow)" />
    
    <!-- Camera/OCR Screen Frame -->
    <rect x="10" y="25" width="80" height="100" rx="8" fill="#161b22" stroke="#30363d" stroke-width="2" />
    <rect x="18" y="35" width="64" height="60" rx="4" fill="#0d1117" stroke="#8b949e" stroke-dasharray="3,3" stroke-width="1" />
    
    <!-- Receipt scanner laser line -->
    <line x1="15" y1="65" x2="85" y2="65" stroke="#ff7b72" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Mini Receipt Lines -->
    <line x1="26" y1="45" x2="56" y2="45" stroke="#30363d" stroke-width="2" />
    <line x1="26" y1="52" x2="74" y2="52" stroke="#30363d" stroke-width="2" />
    <line x1="26" y1="74" x2="44" y2="74" stroke="#bc8cff" stroke-width="2" />
    <line x1="26" y1="81" x2="64" y2="81" stroke="#bc8cff" stroke-width="2" />
    
    <!-- AI Node overlay -->
    <circle cx="90" cy="40" r="16" fill="#58a6ff" stroke="#0d1117" stroke-width="2" filter="url(#glow)"/>
    <path d="M 85,40 L 95,40 M 90,35 L 90,45" stroke="#ffffff" stroke-width="2" stroke-linecap="round" />
    
    <!-- Chat bubble overlay -->
    <rect x="75" y="90" width="45" height="30" rx="6" fill="#bc8cff" stroke="#0d1117" stroke-width="2" />
    <path d="M 85,120 L 85,126 L 91,120 Z" fill="#bc8cff" stroke="#0d1117" stroke-dasharray="0" stroke-width="2" />
    <circle cx="88" cy="105" r="2" fill="#ffffff" />
    <circle cx="97" cy="105" r="2" fill="#ffffff" />
    <circle cx="106" cy="105" r="2" fill="#ffffff" />
  </g>
</svg>
